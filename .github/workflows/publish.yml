name: Publish Package

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run ci
      - id: release
        run: node scripts/npm-release-tag.mjs "${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
      - id: package
        run: |
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const pkg = require("./package.json");
          console.log(`name=${pkg.name}`);
          console.log(`version=${pkg.version}`);
          NODE
      - name: Validate release metadata
        run: |
          if [ "${{ steps.package.outputs.version }}" != "${{ steps.release.outputs.version }}" ]; then
            echo "Release tag ${{ github.event.release.tag_name }} resolves to ${{ steps.release.outputs.version }}, but package.json is ${{ steps.package.outputs.version }}." >&2
            exit 1
          fi

          if [ "${{ github.event.release.prerelease }}" != "${{ steps.release.outputs.is_prerelease }}" ]; then
            echo "GitHub prerelease flag (${{ github.event.release.prerelease }}) does not match semver prerelease state (${{ steps.release.outputs.is_prerelease }})." >&2
            exit 1
          fi
      - id: published
        run: |
          if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }} is already published; skipping npm publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.published.outputs.exists != 'true'
        run: npm publish --provenance --tag "${{ steps.release.outputs.npm_tag }}"
